<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Sênior - Controle de Clientes</title>
    <style>
        :root {
            --primary: #0f172a; --secondary: #1e293b; --accent: #3b82f6;
            --success: #22c55e; --warning: #eab308; --danger: #ef4444;
            --bg: #f1f5f9; --white: #ffffff; --border: #cbd5e1;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #334155; overflow: hidden; }

        /* Bloqueio do Sistema */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; backdrop-filter: blur(5px);
        }
        .lock-card { background: var(--white); padding: 40px; border-radius: 15px; color: var(--primary); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }

        /* Menu Lateral */
        aside { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-header { padding: 30px 20px; font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid var(--secondary); text-align: center; }
        .menu-group { padding: 10px 0; }
        .menu-btn {
            background: transparent; border: none; color: #94a3b8; padding: 12px 20px;
            text-align: left; width: 100%; cursor: pointer; transition: 0.3s; font-size: 0.95rem;
            display: flex; align-items: center; gap: 10px;
        }
        .menu-btn:hover, .menu-btn.active { background: var(--secondary); color: white; border-left: 4px solid var(--accent); }
        
        /* Conteúdo Principal */
        main { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .section { display: none; }
        .section.active { display: flex; flex-direction: column; gap: 20px; }

        /* Painel de Sincronização */
        .sync-bar {
            background: var(--white); padding: 15px 25px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .status-box { display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: var(--danger); transition: 0.3s; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        /* Formulário */
        .card { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }

        .form-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; align-items: end; }
        .col-1 { grid-column: span 1; } .col-2 { grid-column: span 2; } .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; } .col-5 { grid-column: span 5; } .col-6 { grid-column: span 6; } 
        .col-7 { grid-column: span 7; } .col-8 { grid-column: span 8; } .col-9 { grid-column: span 9; }
        .col-10 { grid-column: span 10; } .col-11 { grid-column: span 11; } .col-12 { grid-column: span 12; }
        
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; transition: 0.2s; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        input[readonly] { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-sync { background: var(--accent); color: white; }
        .btn-save { background: var(--success); color: white; }
        .btn-clear { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; }

        .helper-link { font-size: 0.75rem; font-weight: bold; text-decoration: none; color: var(--accent); transition: 0.3s; }
        .helper-link:hover { text-decoration: underline; opacity: 0.8; }
        #link-wpp { color: var(--success); display: none; margin-left: 10px; }

        #localizacao-link {
            display: none; width: 100%; text-align: center; padding: 12px; margin-top: 10px;
            background: #eff6ff; color: var(--accent); border: 2px dashed var(--accent);
            border-radius: 8px; font-weight: bold; text-decoration: none;
        }

        /* Tabelas */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; color: #64748b; font-size: 0.7rem; text-transform: uppercase; }
        .actions { display: flex; gap: 5px; }
        .btn-edit { background: var(--warning); color: white; padding: 5px 10px; font-size: 0.8rem; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-card">
        <h1 style="margin-top:0">Sistema Bloqueado</h1>
        <p>Conecte seu arquivo JSON para carregar os dados do CRM.</p>
        <button class="btn btn-sync" style="font-size: 1.1rem; padding: 15px 30px;" onclick="selecionarArquivoBanco()">📁 Conectar Banco de Dados</button>
    </div>
</div>

<aside>
    <div class="nav-header">CRM SÊNIOR v2.0</div>
    <div class="menu-group">
        <button class="menu-btn active" onclick="trocarPagina('cadastro', this)">👤 Cadastro de Cliente</button>
    </div>
</aside>

<main>
    <div id="sec-cadastro" class="section active">
        <div class="sync-bar">
            <div class="status-box">
                <div id="status-dot" class="indicator"></div>
                <span id="status-text">Aguardando Conexão...</span>
            </div>
            <button class="btn btn-sync" onclick="selecionarArquivoBanco()">🔄 Alterar Arquivo</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 style="margin:0">Dados do Cliente</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-clear" onclick="limparFormulario()">🗑️ Limpar</button>
                    <button class="btn btn-save" onclick="salvarCliente()">💾 Salvar Cliente</button>
                </div>
            </div>
            <form id="cadastroForm">
                <div class="form-grid">
                    <div class="col-1"><label>ID</label><input type="text" id="id_cliente" readonly></div>
                    <div class="col-11"><label>Nome Completo</label><input type="text" id="nome"></div>
                    
                    <div class="col-4">
                        <label>CPF</label>
                        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
                    </div>
                    
                    <div class="col-4">
                        <label>Telefone</label>
                        <input type="text" id="telefone" placeholder="(00) 00000-0000">
                    </div>
                    
                    <div class="col-4">
                        <label>WhatsApp?</label>
                        <div style="display: flex; align-items: center; height: 45px;">
                            <input type="checkbox" id="check_wpp" style="width:20px; height:20px;">
                            <a id="link-wpp" class="helper-link" target="_blank" href="#">[ABRIR CONVERSA]</a>
                        </div>
                    </div>

                    <div class="col-2">
                        <label>CEP</label>
                        <input type="text" id="cep" maxlength="9" placeholder="00000-000" onblur="buscarCEP(this.value)">
                    </div>
                    <div class="col-7"><label>Logradouro</label><input type="text" id="logradouro"></div>
                    <div class="col-1"><label>Nº</label><input type="text" id="numero"></div>
                    <div class="col-2"><label>Compl.</label><input type="text" id="complemento"></div>
                    
                    <div class="col-3"><label>Bairro</label><input type="text" id="bairro"></div>
                    <div class="col-8"><label>Cidade</label><input type="text" id="cidade"></div>
                    <div class="col-1"><label>UF</label><input type="text" id="uf" maxlength="2" placeholder="UF"></div>

                    <div class="col-12">
                        <a id="localizacao-link" class="helper-link" target="_blank" href="#">📍 VER NO GOOGLE MAPS</a>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <h3>Clientes Cadastrados</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Cidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-clientes"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
    let dbHandle;
    let clientesDB = []; 
    const form = document.getElementById('cadastroForm');

    // --- LÓGICA DE PERSISTÊNCIA DO ARQUIVO (IndexedDB) ---
    const DB_NAME = "CRM_Storage";
    const STORE_NAME = "FileHandles";

    async function openIDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = () => request.result.createObjectStore(STORE_NAME);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function salvarHandle(handle) {
        const db = await openIDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put(handle, "lastHandle");
    }

    async function carregarHandle() {
        const db = await openIDB();
        return new Promise((resolve) => {
            const request = db.transaction(STORE_NAME).objectStore(STORE_NAME).get("lastHandle");
            request.onsuccess = () => resolve(request.result);
        });
    }

    // --- BUSCA CEP E LINKS ---
    async function buscarCEP(valor) {
        const cep = valor.replace(/\D/g, '');
        if (cep.length !== 8) return;
        try {
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();
            if (!data.erro) {
                document.getElementById('logradouro').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
                document.getElementById('cidade').value = data.localidade;
                document.getElementById('uf').value = data.uf;
                atualizarLinkMapa();
            }
        } catch (e) { console.error("Erro CEP"); }
    }

    function atualizarLinkMapa() {
        const log = document.getElementById('logradouro').value;
        const num = document.getElementById('numero').value;
        const cid = document.getElementById('cidade').value;
        const link = document.getElementById('localizacao-link');
        if (log && cid) {
            link.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(log + ',' + num + '-' + cid)}`;
            link.style.display = 'block';
        } else { link.style.display = 'none'; }
    }

    ['logradouro', 'numero', 'cidade'].forEach(id => {
        document.getElementById(id).addEventListener('input', atualizarLinkMapa);
    });

    document.getElementById('telefone').addEventListener('input', e => {
        const tel = e.target.value.replace(/\D/g, '');
        const link = document.getElementById('link-wpp');
        if (tel.length >= 10) {
            link.href = `https://wa.me/55${tel}`;
            link.style.display = 'inline-block';
        } else { link.style.display = 'none'; }
    });

    // --- CRUD ---
    function salvarCliente() {
        if (!dbHandle) return alert("Conecte o arquivo primeiro!");
        const cliente = {};
        form.querySelectorAll('input').forEach(i => { if(i.id) cliente[i.id] = i.type === 'checkbox' ? i.checked : i.value; });
        if (!cliente.nome) return alert("Nome obrigatório!");

        const idx = clientesDB.findIndex(c => c.id_cliente === cliente.id_cliente);
        if (idx > -1) clientesDB[idx] = cliente; 
        else clientesDB.push(cliente); 

        renderClientes();
        limparFormulario();
        autoSalvarArquivo(); 
    }

    function renderClientes() {
        const tbody = document.getElementById('lista-clientes');
        tbody.innerHTML = '';
        clientesDB.forEach(c => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${c.id_cliente}</td><td>${c.nome}</td><td>${c.cpf}</td><td>${c.cidade}</td>
                <td class="actions">
                    <button class="btn btn-edit" onclick="editarCliente('${c.id_cliente}')">✏️</button>
                    <button class="btn btn-del" onclick="excluirCliente('${c.id_cliente}')">🗑️</button>
                </td>`;
            tbody.appendChild(tr);
        });
    }

    function editarCliente(id) {
        const c = clientesDB.find(x => x.id_cliente === id);
        if (c) {
            Object.keys(c).forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    if (el.type === 'checkbox') el.checked = c[key];
                    else el.value = c[key];
                }
            });
            atualizarLinkMapa();
            document.getElementById('telefone').dispatchEvent(new Event('input'));
        }
    }

    function excluirCliente(id) {
        if (confirm("Excluir cliente?")) {
            clientesDB = clientesDB.filter(c => c.id_cliente !== id);
            renderClientes();
            autoSalvarArquivo();
        }
    }

    // --- SISTEMA DE ARQUIVO ---
    async function selecionarArquivoBanco() {
        try {
            dbHandle = await window.showOpenFilePicker({
                multiple: false,
                types: [{ description: 'JSON', accept: {'application/json': ['.json']} }]
            }).then(h => h[0]);
            
            await salvarHandle(dbHandle);
            await carregarDadosDoArquivo();
        } catch (e) { console.error(e); }
    }

    async function carregarDadosDoArquivo() {
        try {
            const options = { mode: 'readwrite' };
            if (await dbHandle.queryPermission(options) !== 'granted') {
                if (await dbHandle.requestPermission(options) !== 'granted') return;
            }

            const file = await dbHandle.getFile();
            const content = await file.text();
            clientesDB = content ? JSON.parse(content) : [];

            document.getElementById('lock-screen').style.display = 'none';
            document.body.style.overflow = 'auto';
            atualizarStatus('verde', 'Arquivo Conectado');
            renderClientes();
        } catch (e) {
            atualizarStatus('vermelho', 'Erro ao acessar arquivo');
        }
    }

    async function autoSalvarArquivo() {
        if (!dbHandle) return;
        try {
            const writable = await dbHandle.createWritable();
            await writable.write(JSON.stringify(clientesDB, null, 2));
            await writable.close();
            atualizarStatus('verde', 'Sincronizado');
        } catch (e) { atualizarStatus('amarelo', 'Erro ao salvar'); }
    }

    function atualizarStatus(cor, texto) {
        const cores = { verde: '#22c55e', amarelo: '#eab308', vermelho: '#ef4444' };
        document.getElementById('status-dot').style.background = cores[cor];
        document.getElementById('status-text').innerText = texto;
    }

    function trocarPagina(page, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + page).classList.add('active');
    }

    function gerarID() { document.getElementById('id_cliente').value = Math.floor(100 + Math.random() * 899); }

    function limparFormulario() { 
        form.reset(); 
        gerarID(); 
        document.getElementById('localizacao-link').style.display = 'none';
        document.getElementById('link-wpp').style.display = 'none';
    }

    // Máscaras
    document.getElementById('cpf').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,"");
        v = v.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");
        e.target.value = v;
    });

    document.getElementById('cep').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,"");
        v = v.replace(/(\d{5})(\d)/,"$1-$2");
        e.target.value = v;
    });

    // Auto-carregamento ao iniciar
    window.onload = async () => {
        gerarID();
        const savedHandle = await carregarHandle();
        if (savedHandle) {
            dbHandle = savedHandle;
            // O navegador exige um clique do usuário para reativar a permissão do arquivo
            document.getElementById('status-text').innerText = "Clique em Conectar para Reativar";
        }
    };
</script>
</body>
</html>
