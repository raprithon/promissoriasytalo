<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Sênior - Controle de Clientes</title>
    <style>
        :root {
            --primary: #0f172a; --secondary: #1e293b; --accent: #3b82f6;
            --success: #22c55e; --warning: #eab308; --danger: #ef4444;
            --bg: #f1f5f9; --white: #ffffff; --border: #cbd5e1;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #334155; }
        /* Menu Lateral */
        aside { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-header { padding: 30px 20px; font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid var(--secondary); text-align: center; }
        .menu-group { padding: 10px 0; }
        .menu-label { padding: 15px 20px 5px; font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .menu-btn { 
            background: transparent; border: none; color: #94a3b8; padding: 12px 20px; 
            text-align: left; width: 100%; cursor: pointer; transition: 0.3s; font-size: 0.95rem;
            display: flex; align-items: center; gap: 10px;
        }
        .menu-btn:hover, .menu-btn.active { background: var(--secondary); color: white; border-left: 4px solid var(--accent); }
        /* Conteúdo Principal */
        main { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        /* Painel de Sincronização */
        .sync-bar { 
            background: var(--white); padding: 15px 25px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
        .status-box { display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: var(--danger); transition: 0.3s; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        
        /* Formulário e Organização */
        .card { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        
        .form-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; align-items: end; }
        .col-1 { grid-column: span 1; } .col-2 { grid-column: span 2; } .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; } .col-5 { grid-column: span 5; } .col-6 { grid-column: span 6; }
        .col-8 { grid-column: span 8; } .col-9 { grid-column: span 9; } .col-11 { grid-column: span 11; } .col-12 { grid-column: span 12; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; transition: 0.2s; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        input[readonly] { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-sync { background: var(--accent); color: white; }
        .btn-clear { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; }
        .btn-clear:hover { background: var(--danger); color: white; }
        #link-wpp { color: var(--success); font-weight: bold; text-decoration: none; font-size: 0.8rem; display: none; }
        #localizacao-link { 
            display: none; width: 100%; text-align: center; padding: 12px; margin-top: 10px;
            background: #eff6ff; color: var(--accent); border: 2px dashed var(--accent); 
            border-radius: 8px; font-weight: bold; text-decoration: none;
        }
    </style>
</head>
<body>
<aside>
    <div class="nav-header">CRM SÊNIOR v2.0</div>
    <div class="menu-group">
        <button class="menu-btn active">👤 Cadastro de Cliente</button>
    </div>
    <div class="menu-label">Configurações</div>
    <div class="menu-group">
        <button class="menu-btn">🔑 Usuário e Senha</button>
        <button class="menu-btn">💾 Backup e Banco</button>
    </div>
</aside>
<main>
    <div class="sync-bar">
        <div class="status-box">
            <div id="status-dot" class="indicator"></div>
            <span id="status-text">Não Conectado</span>
        </div>
        <button class="btn btn-sync" onclick="selecionarArquivoBanco()">📁 Definir Local do Banco JSON</button>
    </div>
    <div class="card">
        <div class="card-header">
            <h2 style="margin:0">Dados do Cliente</h2>
            <button class="btn btn-clear" onclick="limparFormulario()">🗑️ Limpar Todos os Campos</button>
        </div>
        <form id="cadastroForm">
            <div class="form-grid">
                <div class="col-1"><label>ID</label><input type="text" id="id_cliente" readonly></div>
                <div class="col-11"><label>Nome Completo</label><input type="text" id="nome"></div>
                <div class="col-4">
                    <label>CPF</label>
                    <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
                    <small id="cpf-status" style="font-weight: bold;"></small>
                </div>
                <div class="col-4"><label>Telefone</label><input type="text" id="telefone" placeholder="(00) 00000-0000"></div>
                <div class="col-4">
                    <label>É WhatsApp?</label>
                    <div style="display: flex; align-items: center; gap: 10px; height: 45px;">
                        <input type="checkbox" id="check_wpp" style="width:20px; height:20px;">
                        <a id="link-wpp" target="_blank" href="#">[Validar Link]</a>
                    </div>
                </div>
                <div class="col-3"><label>CEP</label><input type="text" id="cep" maxlength="9" placeholder="00000-000"></div>
                <div class="col-9"><label>Logradouro</label><input type="text" id="logradouro"></div>
                <div class="col-2"><label>Número</label><input type="text" id="numero"></div>
                <div class="col-4"><label>Complemento</label><input type="text" id="complemento"></div>
                <div class="col-6"><label>Bairro</label><input type="text" id="bairro"></div>
                <div class="col-3">
                    <label>UF (Sigla)</label>
                    <input list="ufs" id="uf" placeholder="Selecione">
                    <datalist id="ufs">
                        <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option><option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option><option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option><option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option><option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option><option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option><option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option><option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option><option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                    </datalist>
                </div>
                <div class="col-9">
                    <label>Cidade</label>
                    <input list="cidades" id="cidade" placeholder="Digite o nome da cidade">
                    <datalist id="cidades"></datalist>
                </div>
                <div class="col-12">
                    <a id="localizacao-link" target="_blank" href="#">📍 LOCALIZAÇÃO (Ver no Google Maps)</a>
                </div>
            </div>
        </form>
    </div>
</main>
<script>
    let dbHandle;
    const form = document.getElementById('cadastroForm');
    // Inicialização do ID
    window.onload = () => { gerarID(); };
    function gerarID() { document.getElementById('id_cliente').value = Math.floor(100 + Math.random() * 899); }
    // --- LOGICA DE BANCO DE DADOS (JSON LOCAL) ---
    async function selecionarArquivoBanco() {
        try {
            dbHandle = await window.showSaveFilePicker({
                suggestedName: 'meu_banco_clientes.json',
                types: [{ description: 'Arquivo JSON', accept: {'application/json': ['.json']} }]
            });
            atualizarStatus('verde', 'Conectado e Sincronizando');
            autoSalvar();
        } catch (err) {
            atualizarStatus('vermelho', 'Não Conectado');
        }
    }
    async function autoSalvar() {
        if (!dbHandle) {
            atualizarStatus('amarelo', 'Não Salvando (Selecione local)');
            return;
        }
        const dados = {};
        const elementos = form.querySelectorAll('input');
        elementos.forEach(el => {
            if(el.id) dados[el.id] = el.type === 'checkbox' ? el.checked : el.value;
        });
        try {
            const writable = await dbHandle.createWritable();
            await writable.write(JSON.stringify(dados, null, 2));
            await writable.close();
            atualizarStatus('verde', 'Conectado e Sincronizando');
        } catch (e) {
            atualizarStatus('amarelo', 'Erro ao sincronizar');
        }
    }
    function atualizarStatus(cor, texto) {
        const cores = { verde: '#22c55e', amarelo: '#eab308', vermelho: '#ef4444' };
        document.getElementById('status-dot').style.background = cores[cor];
        document.getElementById('status-text').innerText = texto;
    }
    // --- VALIDAÇÕES E MÁSCARAS ---
    document.getElementById('cpf').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, "");
        v = v.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        e.target.value = v;
        const status = document.getElementById('cpf-status');
        if(v.length === 14) {
            const ok = validarCPF(v);
            status.innerText = ok ? "✓ Válido" : "✗ Inválido";
            status.style.color = ok ? "green" : "red";
        } else { status.innerText = ""; }
    });
    function validarCPF(cpf) {
        cpf = cpf.replace(/[^\d]+/g,'');
        if(cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
        let soma = 0, resto;
        for (let i=1; i<=9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(9, 10))) return false;
        soma = 0;
        for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        return (resto === parseInt(cpf.substring(10, 11)));
    }
    document.getElementById('telefone').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d{5})(\d)/, "$1-$2");
        e.target.value = v;
    });
    document.getElementById('check_wpp').addEventListener('change', e => {
        const link = document.getElementById('link-wpp');
        const tel = document.getElementById('telefone').value.replace(/\D/g, "");
        if(e.target.checked && tel.length >= 10) {
            link.href = `https://wa.me/55${tel}`;
            link.style.display = 'block';
        } else { link.style.display = 'none'; }
    });
    // --- INTELIGÊNCIA DE ENDEREÇO (VIACEP) ---
    document.getElementById('cep').addEventListener('blur', async e => {
        const cep = e.target.value.replace(/\D/g, "");
        if(cep.length === 8) {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const d = await res.json();
            if(!d.erro) {
                document.getElementById('logradouro').value = d.logradouro;
                document.getElementById('bairro').value = d.bairro;
                document.getElementById('uf').value = d.uf;
                document.getElementById('cidade').value = d.localidade;
                atualizarMaps();
            }
        }
    });
    // Sincronização Inversa (Endereço -> CEP)
    const camposEnd = ['logradouro', 'bairro', 'uf', 'cidade'];
    camposEnd.forEach(id => {
        document.getElementById(id).addEventListener('input', async () => {
            const rua = document.getElementById('logradouro').value;
            const cid = document.getElementById('cidade').value;
            const uf = document.getElementById('uf').value;
            if(rua.length > 5 && cid.length > 3 && uf.length === 2) {
                try {
                    const res = await fetch(`https://viacep.com.br/ws/${uf}/${cid}/${rua}/json/`);
                    const d = await res.json();
                    if(d.length > 0) document.getElementById('cep').value = d[0].cep;
                } catch(e){}
            }
            atualizarMaps();
        });
    });
    function atualizarMaps() {
        const rua = document.getElementById('logradouro').value;
        const num = document.getElementById('numero').value;
        const cid = document.getElementById('cidade').value;
        const link = document.getElementById('localizacao-link');
        if(rua && cid) {
            link.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(rua + ',' + num + ' ' + cid)}`;
            link.style.display = 'block';
        }
    }
    // Deletar UF/Cidade
    ['uf', 'cidade'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
            if(e.key === 'Delete') { e.target.value = ''; autoSalvar(); }
        });
    });
    function limparFormulario() {
        form.reset();
        gerarID();
        document.getElementById('link-wpp').style.display = 'none';
        document.getElementById('localizacao-link').style.display = 'none';
        document.getElementById('cpf-status').innerText = "";
        autoSalvar();
    }
    form.addEventListener('input', autoSaveDebounce);
    
    // Debounce para não sobrecarregar o arquivo em cada tecla
    let timeout;
    function autoSaveDebounce() {
        clearTimeout(timeout);
        timeout = setTimeout(autoSalvar, 500);
    }
</script>
</body>
</html>
